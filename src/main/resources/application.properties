spring.datasource.username=csdev
spring.datasource.password=csdev1234

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Spring Data JDBC만 쓴다면 Hibernate 관련 설정은 필요 없지만,
# 혹시 JPA를 쓰신다면 다음과 같이 DDL 모드를 지정할 수 있습니다.
# spring.jpa.hibernate.ddl-auto=validate
spring.devtools.restart.enabled=true

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
# 정적 리소스 (배포)
spring.web.resources.static-locations=classpath:/static/
logging.level.org.springframework.security=DEBUG
logging.level.com.coresolution.pe=DEBUG
logging.level.org.thymeleaf=DEBUG



# 또는 체인 캐시를 전부 비활성화
spring.devtools.livereload.enabled=true
spring.freemarker.cache=false
spring.resources.chain.cache=false
spring.thymeleaf.cache=false
# DevTools 자동 재시작 배포 시에는 주석처리 해야함
spring.thymeleaf.prefix=file:src/main/resources/templates/
spring.web.resources.static-locations=file:src/main/resources/static/,classpath:/static/
spring.web.resources.cache.period=0
server.port=9090

# 관리자 부서코드 (예: CORE)
app.admin.sub-code=CORE

# 관리자 사번 (연도 전환 시 자동 시딩에 사용)
app.admin.id=12365478

# snake case to camelCase 매핑 설정
mybatis.configuration.map-underscore-to-camel-case=true

# 실제 바인딩된 파라미터랑 실행된 SQL이 콘솔이 찍히도록
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

server.forward-headers-strategy=framework

openai.api-key=${OPENAI_API_KEY:}
openai.model=gpt-4o-mini

# 현재 평가 연도 (매년 이 값만 변경하면 됨)
app.current.eval-year=2026

# 배경 이미지 업로드 경로 (정적 리소스 서빙 경로와 맞춰야 함)
app.upload.bg-dir=src/main/resources/static/uploads/bg

# 파일 업로드 크기 제한
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB