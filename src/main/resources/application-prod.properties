# ---- 배포용 템플릿/정적 (핵심) ----

spring.application.name=pe
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.cache=true

spring.web.resources.static-locations=classpath:/static/
# 캐시 전략(원하면 해시 전략 함께 사용)
spring.web.resources.cache.period=31536000
spring.web.resources.chain.cache=true
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

# 로깅(운영 최소)
logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.org.thymeleaf=INFO
logging.level.com.coresolution.pe=INFO

# JDBC URL 포맷: jdbc:mysql://호스트:포트/DB명?옵션
spring.datasource.url=jdbc:mysql://hr.sosyge.net:3306/?serverTimezone=Asia/Seoul&useSSL=false&characterEncoding=UTF-8
spring.datasource.username=csdev
spring.datasource.password=csdev1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

server.error.include-message=always
server.error.include-stacktrace=always
logging.level.com.coresolution.pe=DEBUG
logging.level.org.springframework=DEBUG

# 관리자 부서코드 (예: CORE)
app.admin.sub-code=CORE
# ← 주석 처리하거나
# server.servlet.context-path=/pe   
# ← 이렇게 루트로 고정
server.servlet.context-path=/       

openai.api-key=${OPENAI_API_KEY:}
openai.model=gpt-4o-mini