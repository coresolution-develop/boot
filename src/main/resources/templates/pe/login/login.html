<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="ctx-path" th:content="@{/}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="코어솔루션 인사평가시스템">
  <meta property="og:type" content="website">
  <meta property="og:description" content="코어솔루션 인사평가시스템">
  <title th:text="${currentEvalYear} + '년 직원 근무평가 | 로그인'">직원 근무평가 | 로그인</title>
  <link rel="stylesheet" th:href="@{/css/css.css}">
  <link rel="stylesheet" th:href="@{/css/alertcss.css}">
  <link rel="shortcut icon" th:href="@{/favicon/favicon.ico}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 55%, #1b304a 100%);
      font-family: 'Pretendard', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      padding: 20px;
    }

    /* ── 카드 ── */
    .login-wrap {
      width: 100%;
      max-width: 440px;
    }

    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 44px 40px 38px;
      box-shadow: 0 24px 72px rgba(0,0,0,.36);
    }

    /* ── 헤더 ── */
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-year-badge {
      display: inline-block;
      background: #1b304a;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      padding: 4px 14px;
      border-radius: 20px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .login-title {
      font-size: 22px;
      font-weight: 800;
      color: #1e293b;
      line-height: 1.3;
      letter-spacing: -.02em;
    }
    .login-subtitle {
      font-size: 13px;
      color: #64748b;
      margin-top: 6px;
    }
    .login-logo-img {
      display: block;
      margin: 14px auto 0;
      height: 26px;
      width: auto;
      opacity: .6;
    }

    /* ── 폼 필드 ── */
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
      letter-spacing: .02em;
    }
    .form-control {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #d1d5db;
      border-radius: 9px;
      font-size: 14px;
      color: #1e293b;
      background: #fafafa;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-control:focus {
      outline: none;
      border-color: #1b304a;
      box-shadow: 0 0 0 3px rgba(27,48,74,.1);
      background: #fff;
    }
    .form-control::placeholder { color: #9ca3af; }

    /* ── 로그인 타입 토글 ── */
    .login-type-wrap {
      margin-bottom: 14px;
    }
    .login-type-label {
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
      letter-spacing: .02em;
    }
    .login-type-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid #d1d5db;
      border-radius: 9px;
      overflow: hidden;
      background: #f1f5f9;
    }
    .login-type-toggle input[type="radio"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .login-type-toggle label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 8px;
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      transition: background .15s, color .15s;
      text-align: center;
      line-height: 1.4;
      gap: 2px;
    }
    .login-type-toggle label em {
      font-style: normal;
      font-size: 10.5px;
      font-weight: 400;
      color: #94a3b8;
      white-space: nowrap;
    }
    .login-type-toggle input[type="radio"]:checked + label {
      background: #1b304a;
      color: #fff;
    }
    .login-type-toggle input[type="radio"]:checked + label em {
      color: #93c5fd;
    }

    /* ── 비밀번호 찾기 ── */
    .pw-find-row {
      text-align: right;
      margin-bottom: 18px;
      margin-top: -2px;
    }
    .pw-find-link {
      font-size: 12px;
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
    }
    .pw-find-link:hover { text-decoration: underline; }

    /* ── 로그인 버튼 ── */
    .btn-login {
      width: 100%;
      padding: 13px;
      background: #1b304a;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .02em;
      transition: filter .15s, transform .08s;
    }
    .btn-login:hover { filter: brightness(1.15); }
    .btn-login:active { transform: scale(.99); }

    /* ── 안내 문구 ── */
    .login-hint {
      margin-top: 18px;
      padding: 12px 14px;
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 8px;
      font-size: 12px;
      color: #0369a1;
      line-height: 1.6;
    }

    /* ── 모바일 ── */
    @media (max-width: 480px) {
      .login-card { padding: 34px 24px 28px; }
      .login-title { font-size: 19px; }
    }

    /* ── Notice Modal ── */
    .notice-modal {
      position: fixed !important;
      inset: 0 !important;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 99999 !important;
    }
    .notice-modal.show { display: flex !important; }
    .notice-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.48);
    }
    .notice-dialog {
      position: relative;
      z-index: 1;
      width: min(720px, 94vw);
      max-height: 90vh;
      overflow: hidden;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 24px 72px rgba(0,0,0,.32);
      display: flex;
      flex-direction: column;
    }
    .notice-close {
      position: absolute;
      right: 10px; top: 8px;
      width: 36px; height: 36px;
      border: none; background: transparent;
      font-size: 28px; line-height: 36px;
      cursor: pointer; color: #64748b;
      transition: color .12s;
    }
    .notice-close:hover { color: #334155; }
    .notice-head {
      padding: 16px 20px 10px;
      border-bottom: 1px solid #e5e7eb;
    }
    .notice-head h3 {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      color: #0f172a;
    }
    .notice-body--scroll {
      padding: 18px 22px;
      max-height: 62vh;
      overflow: auto;
      overscroll-behavior: contain;
    }
    .notice-body--scroll::-webkit-scrollbar { width: 6px; }
    .notice-body--scroll::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 999px;
    }
    .notice-list {
      list-style: none;
      margin: 0; padding: 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .notice-item {
      padding: 16px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: #fff;
    }
    .notice-foot {
      border-top: 1px solid #e5e7eb;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .notice-hide-today {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #374151;
      cursor: pointer;
    }
    .btn-ok {
      padding: 10px 20px;
      border-radius: 9px;
      border: none;
      background: #1b304a;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-ok:hover { filter: brightness(1.12); }

    /* memo 카드 */
    .memo {
      position: relative;
      padding: 26px 16px 16px;
      background: transparent;
      isolation: isolate;
    }
    .memo::before, .memo::after {
      content: "";
      position: absolute;
      inset: auto 12px -8px 12px;
      height: 14px;
      border-radius: 8px;
      background: #e9eef6;
      z-index: -2;
    }
    .memo::after { inset: auto 20px -16px 20px; background: #f3f6fb; z-index: -3; }
    .memo__tape {
      position: absolute;
      left: 50%; top: 10px;
      transform: translate(-50%, -50%);
      width: 120px; height: 20px;
      border-radius: 4px;
      background: linear-gradient(180deg, #b7d2ee, #9fc2e6);
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      opacity: .95;
    }
    .memo__head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding: 0 4px;
    }
    .memo__head .badge {
      width: 12px; height: 12px;
      border-radius: 3px;
      background: #123a73;
      box-shadow: 0 0 0 2px #e8eef7;
    }
    .memo__title {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      color: #123a73;
    }
    .memo__paper {
      background: #fff;
      border: 1px solid #e6e9ef;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(16,24,40,.06);
      padding: 14px 16px;
    }
    .memo__body {
      color: #101828;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .memo__body p strong { color: #ff7a00; }

    @media (max-width: 480px) {
      .notice-dialog { width: 94vw; }
      .notice-body--scroll { padding: 14px; max-height: 70vh; }
    }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">

    <!-- 헤더 -->
    <div class="login-header">
      <div class="login-year-badge" th:text="${currentEvalYear} + 'yr'">2026yr</div>
      <h1 class="login-title" th:text="${currentEvalYear} + '년 직원 근무평가'">직원 근무평가</h1>
      <p class="login-subtitle">사번으로 로그인하세요</p>
      <img th:src="@{/img/core_logo.png}" class="login-logo-img" alt="코어솔루션"
           onerror="this.style.display='none'">
    </div>

    <!-- 로그인 폼 -->
    <form th:action="@{/loginAction}" method="post" id="login_form">

      <!-- 사번 -->
      <div class="form-group">
        <label class="form-label" for="id">사번</label>
        <input type="text" id="id" name="id" class="form-control"
               placeholder="사번을 입력하세요"
               autocomplete="username"
               th:value="${savedId}">
      </div>

      <!-- 이름/비밀번호 (login.js가 placeholder·type 전환) -->
      <div class="form-group">
        <label class="form-label" for="pwd" id="pwdLabel">이름</label>
        <input type="text" id="pwd" name="name" class="form-control"
               placeholder="이름을 입력하세요"
               autocomplete="off"
               value="">
      </div>

      <!-- 로그인 타입 토글 -->
      <div class="login-type-wrap">
        <p class="login-type-label">로그인 방식</p>
        <div class="login-type-toggle">
          <input type="radio" id="chk_name" name="loginType" value="byName"
                 th:checked="${savedLoginType == null or savedLoginType == '' or savedLoginType == 'byName'}">
          <label for="chk_name">
            사번 / 이름
            <em>비밀번호 설정 전</em>
          </label>
          <input type="radio" id="chk_no" name="loginType" value="byPwd"
                 th:checked="${savedLoginType == 'byPwd'}">
          <label for="chk_no">
            사번 / 비밀번호
            <em>비밀번호 설정 후</em>
          </label>
        </div>
      </div>

      <!-- 비밀번호 찾기 -->
      <div class="pw-find-row">
        <a th:href="@{/pwdfind}" class="pw-find-link">비밀번호 찾기 →</a>
      </div>

      <!-- 로그인 버튼 -->
      <button type="submit" id="loginbtn" class="btn-login">로그인</button>

    </form>

    <!-- 안내 문구 -->
    <div class="login-hint">
      💡 처음 로그인하거나 비밀번호를 설정하지 않은 경우 <strong>사번 / 이름</strong> 방식을 선택하세요.
      비밀번호 설정 후에는 <strong>사번 / 비밀번호</strong>로 변경해주세요.
    </div>

  </div>
</div>

<!-- ── 알림 모달 (login.js 의존 — 구조 변경 금지) ── -->
<div class="modal normal">
  <div class="modal_body">
    <div>
      <img class="menu_icon" th:src="@{/icon/ev/alert_img.png}" onerror="this.style.display='none'">
      <div class="menu_msg">text</div>
      <div class="modal_footer">
        <div class="btn modal_btn" id="modalOkBtn" onclick="closePopup()">확인</div>
      </div>
    </div>
  </div>
</div>

<!-- legacy 모달 (사용처 유지) -->
<div class="modal2 normal">
  <div class="modal_body2">
    <div>
      <img class="menu_icon" th:src="@{/icon/ev/alert_img.png}" onerror="this.style.display='none'">
      <div class="menu_msg2">text</div>
      <div class="modal_footer2">
        <div class="btn modal_btn2" onclick="closePopup2()">확인</div>
      </div>
    </div>
  </div>
</div>

<!-- jQuery + login.js (순서 유지) -->
<script src="https://code.jquery.com/jquery-latest.min.js"></script>
<script th:src="@{/js/login/login.js}"></script>

<!-- ── 공지사항 모달 ── -->
<div class="notice-modal" id="noticeModal" aria-hidden="true">
  <div class="notice-backdrop" data-close="1"></div>
  <div class="notice-dialog" role="dialog" aria-modal="true" aria-labelledby="noticeModalTitle">
    <button type="button" class="notice-close" aria-label="닫기" data-close="1">×</button>

    <header class="notice-head">
      <h3 id="noticeModalTitle">📢 공지사항</h3>
    </header>

    <section class="notice-body notice-body--scroll">
      <ol class="notice-list" th:if="${!#lists.isEmpty(noticeV2List)}">
        <li class="notice-item" th:each="n : ${noticeV2List}">
          <div class="memo">
            <div class="memo__tape"></div>
            <header class="memo__head">
              <span class="badge"></span>
              <h4 class="memo__title" th:text="${n.title}">Notice</h4>
            </header>
            <div class="memo__paper">
              <div class="memo__body" th:utext="${n.bodyMd}"></div>
            </div>
          </div>
        </li>
      </ol>
    </section>

    <footer class="notice-foot">
      <label class="notice-hide-today">
        <input type="checkbox" id="noticeHideToday"> 오늘 하루 보지 않기
      </label>
      <div>
        <button type="button" class="btn-ok" id="noticeOk" data-close="1">확인</button>
      </div>
    </footer>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  var $modal = document.getElementById('noticeModal');
  var $ok    = document.getElementById('noticeOk');
  var $hide  = document.getElementById('noticeHideToday');
  if (!$modal) return;

  var versionTag = (document.getElementById('noticeVersion') || {}).dataset?.tag
                 || 'v' + new Date().toISOString().slice(0, 10);
  var key = 'noticeDismissed_' + versionTag;

  function open() {
    $modal.classList.add('show');
    $modal.setAttribute('aria-hidden', 'false');
    document.documentElement.style.overflow = 'hidden';
    document.body.style.overflow = 'hidden';
    setTimeout(function () { if ($ok) $ok.focus(); }, 0);
    window.addEventListener('keydown', onKey);
  }
  function close() {
    $modal.classList.remove('show');
    $modal.setAttribute('aria-hidden', 'true');
    document.documentElement.style.overflow = '';
    document.body.style.overflow = '';
    window.removeEventListener('keydown', onKey);
    if ($hide && $hide.checked) {
      try { localStorage.setItem(key, '1'); } catch (e) {}
    }
  }
  function onKey(e) { if (e.key === 'Escape') close(); }

  if ($ok) $ok.addEventListener('click', close);
  $modal.addEventListener('click', function (e) {
    if (e.target && e.target.dataset && e.target.dataset.close) close();
  });

  var params  = new URLSearchParams(location.search);
  var force   = params.get('notice') === '1';
  var hidden  = localStorage.getItem(key) === '1';
  var hasAny  = !!$modal.querySelector('.notice-list');

  if (hasAny && (force || !hidden)) open();
});
</script>
</body>
</html>
