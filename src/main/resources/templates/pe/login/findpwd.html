<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>비밀번호 찾기</title>
  <link rel="stylesheet" th:href="@{/css/css.css}">
  <link rel="shortcut icon" th:href="@{/favicon/favicon.ico}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 55%, #1b304a 100%);
      font-family: 'Pretendard', 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      padding: 20px;
    }

    .find-wrap {
      width: 100%;
      max-width: 440px;
    }

    .find-card {
      background: #fff;
      border-radius: 20px;
      padding: 44px 40px 36px;
      box-shadow: 0 24px 72px rgba(0,0,0,.36);
    }

    /* ── 헤더 ── */
    .find-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .find-badge {
      display: inline-block;
      background: #1b304a;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      padding: 4px 14px;
      border-radius: 20px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .find-title {
      font-size: 22px;
      font-weight: 800;
      color: #1e293b;
      letter-spacing: -.02em;
    }
    .find-subtitle {
      font-size: 13px;
      color: #64748b;
      margin-top: 6px;
    }

    /* ── 폼 ── */
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
      letter-spacing: .02em;
    }
    .form-control {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #d1d5db;
      border-radius: 9px;
      font-size: 14px;
      color: #1e293b;
      background: #fafafa;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-control:focus {
      outline: none;
      border-color: #1b304a;
      box-shadow: 0 0 0 3px rgba(27,48,74,.1);
      background: #fff;
    }
    .form-control::placeholder { color: #9ca3af; }
    .form-control.is-error {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239,68,68,.1);
    }

    /* ── 에러 메시지 ── */
    .error-msg {
      display: none;
      padding: 10px 14px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      font-size: 13px;
      color: #dc2626;
      margin-bottom: 14px;
    }
    .error-msg.show { display: block; }

    /* ── 성공 배너 ── */
    .success-banner {
      display: none;
      padding: 10px 14px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      font-size: 13px;
      color: #166534;
      font-weight: 600;
      margin-bottom: 14px;
    }
    .success-banner.show { display: block; }

    /* ── Step 구분 ── */
    #step-reset {
      display: none;
    }
    #step-reset.show {
      display: block;
    }

    .divider {
      border: none;
      border-top: 1px solid #f1f5f9;
      margin: 18px 0;
    }

    /* ── 버튼 ── */
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: #1b304a;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .02em;
      transition: filter .15s, transform .08s;
      margin-top: 4px;
    }
    .btn-primary:hover { filter: brightness(1.15); }
    .btn-primary:active { transform: scale(.99); }
    .btn-primary:disabled {
      background: #94a3b8;
      cursor: not-allowed;
      filter: none;
    }

    /* ── 뒤로가기 ── */
    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #64748b;
      text-decoration: none;
    }
    .back-link:hover { color: #1e293b; }

    /* ── 문의사항 ── */
    .contact-box {
      margin-top: 24px;
      padding: 14px 16px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
    }
    .contact-box p.contact-title {
      font-size: 12px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 8px;
    }
    .contact-box ul {
      list-style: none;
      padding: 0; margin: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .contact-box li {
      font-size: 12px;
      color: #3b82f6;
      line-height: 1.5;
    }
    .contact-box li.note {
      color: #64748b;
      font-size: 11px;
      margin-top: 4px;
    }

    @media (max-width: 480px) {
      .find-card { padding: 34px 24px 28px; }
      .find-title { font-size: 19px; }
    }
  </style>
</head>
<body>

<div class="find-wrap">
  <div class="find-card">

    <!-- 헤더 -->
    <div class="find-header">
      <div class="find-badge">Find Password</div>
      <h1 class="find-title">비밀번호 찾기</h1>
      <p class="find-subtitle">사번과 휴대폰번호로 본인확인 후 변경하세요</p>
    </div>

    <!-- 에러 / 성공 메시지 -->
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-banner" id="successBanner"></div>

    <!-- Step 1: 본인확인 -->
    <div id="step-find">
      <div class="form-group">
        <label class="form-label" for="id">사번</label>
        <input type="text" id="id" name="id" class="form-control"
               placeholder="사번을 입력하세요" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="ph">휴대폰번호</label>
        <input type="text" id="ph" name="ph" class="form-control"
               placeholder="01012345678 (- 없이 입력)" autocomplete="tel"
               maxlength="13">
      </div>
      <button type="button" id="find" class="btn-primary">정보 확인</button>
    </div>

    <!-- Step 2: 새 비밀번호 입력 (정보확인 성공 후 노출) -->
    <div id="step-reset">
      <hr class="divider">
      <div class="form-group">
        <label class="form-label" for="pwd">새 비밀번호</label>
        <input type="password" id="pwd" name="pwd" class="form-control"
               placeholder="새 비밀번호를 입력하세요" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label" for="pwd2">비밀번호 확인</label>
        <input type="password" id="pwd2" name="pwd2" class="form-control"
               placeholder="비밀번호를 다시 입력하세요" autocomplete="new-password">
      </div>
      <button type="button" id="pwdAct" class="btn-primary">비밀번호 변경</button>
    </div>

    <a href="/login" class="back-link">← 로그인으로 돌아가기</a>

    <!-- 문의사항 -->
    <div class="contact-box">
      <p class="contact-title">📞 문의사항</p>
      <ul>
        <li>코어솔루션 전준호 팀장 063-250-4506</li>
        <li>코어솔루션 이수민 주임 063-250-4545</li>
        <li>비상연락처 (전준호) 010-4454-8201</li>
        <li class="note">※ 문자로 내용(소속·부서·사원명 포함) 남겨주시면 확인 후 바로 조치하겠습니다.</li>
      </ul>
    </div>

  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.js"></script>
<script th:inline="javascript">
/*<![CDATA[*/
const URL_FIND   = /*[[@{/pwd/find-ajax}]]*/ '/pwd/find-ajax';
const YEAR       = /*[[${year} ?: 2025]]*/ 2025;
const URL_PWDACT = /*[[@{/pwd/act/}]]*/ '/pwd/act/';
const URL_LOGIN  = /*[[@{/login}]]*/ '/login';

$(function () {

  /* ── 유틸 ── */
  function showError(msg) {
    $('#errorMsg').text(msg).addClass('show');
    $('#successBanner').removeClass('show');
  }
  function showSuccess(msg) {
    $('#successBanner').text(msg).addClass('show');
    $('#errorMsg').removeClass('show');
  }
  function clearMessages() {
    $('#errorMsg').removeClass('show');
    $('#successBanner').removeClass('show');
    $('#id, #ph').removeClass('is-error');
  }

  /* ── 입력 포커스 시 에러 초기화 ── */
  $('#id, #ph').on('focus', function () {
    clearMessages();
    $('#step-reset').removeClass('show');
  });

  /* ── 정보 확인 ── */
  $('#find').on('click', function () {
    clearMessages();

    const id = $('#id').val().trim();
    let ph    = $('#ph').val().trim().replace(/-/g, '');

    if (!id) { showError('사번을 입력해주세요.'); $('#id').focus(); return; }
    if (!ph)  { showError('휴대폰번호를 입력해주세요.'); $('#ph').focus(); return; }

    // 하이픈 포맷 통일
    if (ph.length === 11) ph = ph.slice(0,3) + '-' + ph.slice(3,7) + '-' + ph.slice(7);

    const $btn = $(this).prop('disabled', true).text('확인 중…');

    $.ajax({
      url: URL_FIND,
      type: 'POST',
      dataType: 'json',
      data: { id, ph, year: YEAR },
      success: function (res) {
        if (res.success === true) {
          showSuccess('✅ 본인 확인이 완료되었습니다. 새 비밀번호를 입력해주세요.');
          $('#step-reset').addClass('show');
          $('#pwd').focus();
        } else {
          showError('검색된 정보가 없습니다. 사번과 휴대폰번호를 확인해주세요.');
          $('#id, #ph').addClass('is-error');
        }
      },
      error: function () {
        showError('서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
      },
      complete: function () {
        $btn.prop('disabled', false).text('정보 확인');
      }
    });
  });

  /* ── 비밀번호 변경 ── */
  $(document).on('click', '#pwdAct', function () {
    clearMessages();

    const id   = $('#id').val().trim();
    const pwd  = $('#pwd').val();
    const pwd2 = $('#pwd2').val();

    if (!pwd)           { showError('새 비밀번호를 입력해주세요.'); $('#pwd').focus(); return; }
    if (!pwd2)          { showError('비밀번호 확인을 입력해주세요.'); $('#pwd2').focus(); return; }
    if (pwd !== pwd2)   { showError('비밀번호가 일치하지 않습니다.'); $('#pwd2').addClass('is-error').focus(); return; }

    const $btn = $(this).prop('disabled', true).text('변경 중…');

    $.ajax({
      url: URL_PWDACT + encodeURIComponent(id),
      type: 'POST',
      dataType: 'json',
      data: { id, pwd },
      success: function (res) {
        if (res.result === 'Y') {
          showSuccess('✅ 비밀번호가 변경되었습니다. 변경된 비밀번호로 로그인해주세요.');
          $('#step-reset').removeClass('show');
          setTimeout(function () { location.replace(URL_LOGIN); }, 1800);
        } else {
          showError('비밀번호 변경 중 오류가 발생했습니다. 관리자에게 문의하세요.');
          $btn.prop('disabled', false).text('비밀번호 변경');
        }
      },
      error: function () {
        showError('서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
        $btn.prop('disabled', false).text('비밀번호 변경');
      }
    });
  });

  /* ── Enter 키 지원 ── */
  $('#id, #ph').on('keydown', function (e) {
    if (e.key === 'Enter') $('#find').trigger('click');
  });
  $(document).on('keydown', '#pwd, #pwd2', function (e) {
    if (e.key === 'Enter') $('#pwdAct').trigger('click');
  });

});
/*]]>*/
</script>
</body>
</html>
