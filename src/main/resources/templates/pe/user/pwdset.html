<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:attr="data-collapsed=${sidebarCollapsed ? 'true' : 'false'}"
      th:styleappend="|--nav-w:${sidebarCollapsed ? '70px' : '240px'}|">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 변경</title>
  <link rel="stylesheet" th:href="@{/css/css.css}">
  <link rel="stylesheet" th:href="@{/css/alertcss.css}">
  <link rel="stylesheet" th:href="@{/css/leftMenu.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
  <link rel="shortcut icon" th:href="@{/favicon/favicon.ico}">
  <script>(function(){ document.documentElement.setAttribute('data-first-paint',''); })();</script>
  <style>
    /* ── 페이지 레이아웃 ── */
    .pwdset-outer {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 20px 60px;
      min-height: calc(100vh - 62px);
    }

    /* ── 카드 ── */
    .pwdset-card {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border: 1px solid #e5e9ef;
      border-radius: 16px;
      padding: 40px 40px 36px;
      box-shadow: 0 4px 24px rgba(0,0,0,.07);
    }

    /* ── 헤더 ── */
    .pwdset-header {
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid #f1f5f9;
    }
    .pwdset-header h1 {
      font-size: 20px;
      font-weight: 800;
      color: #1e293b;
      letter-spacing: -.02em;
      margin-bottom: 4px;
    }
    .pwdset-header p {
      font-size: 13px;
      color: #64748b;
    }

    /* ── 폼 ── */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
      letter-spacing: .02em;
    }
    .form-control {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      color: #1e293b;
      background: #fafafa;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-control:focus {
      outline: none;
      border-color: #1b304a;
      box-shadow: 0 0 0 3px rgba(27,48,74,.1);
      background: #fff;
    }
    .form-control::placeholder { color: #9ca3af; }

    /* readonly */
    .form-control[readonly] {
      background: #f1f5f9;
      color: #64748b;
      cursor: default;
      border-color: #e2e8f0;
    }

    /* 구분선 */
    .divider {
      border: none;
      border-top: 1px solid #f1f5f9;
      margin: 20px 0;
    }

    /* ── 버튼 ── */
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: #1b304a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .02em;
      transition: filter .15s, transform .08s;
      margin-top: 4px;
    }
    .btn-submit:hover { filter: brightness(1.15); }
    .btn-submit:active { transform: scale(.99); }

    /* 안내 */
    .pwd-hint {
      margin-top: 16px;
      padding: 11px 14px;
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 8px;
      font-size: 12px;
      color: #0369a1;
      line-height: 1.6;
    }

    @media (max-width: 600px) {
      .pwdset-outer { padding: 28px 16px 40px; }
      .pwdset-card { padding: 28px 22px 24px; }
      .pwdset-header h1 { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div th:replace="~{Include/layout :: header}"></div>
  <div th:replace="~{Include/layout :: nav_section2}"></div>

  <main class="main-content">
    <div class="pwdset-outer">
      <div class="pwdset-card">

        <div class="pwdset-header">
          <h1>비밀번호 변경</h1>
          <p>현재 계정의 비밀번호를 변경합니다</p>
        </div>

        <form id="frm" th:action="@{/pwdAction}" method="post">
          <input type="hidden" name="idx" id="idx" th:value="${idx}">

          <!-- 사번 (readonly) -->
          <div class="form-group">
            <label class="form-label">사번</label>
            <input type="text" name="id" id="id" class="form-control"
                   readonly th:value="${id}" placeholder="사번">
          </div>

          <!-- 이름 (readonly) -->
          <div class="form-group">
            <label class="form-label">이름</label>
            <input type="text" name="name" id="name" class="form-control"
                   readonly th:value="${name}" placeholder="이름">
          </div>

          <hr class="divider">

          <!-- 새 비밀번호 -->
          <div class="form-group">
            <label class="form-label" for="pwd">새 비밀번호</label>
            <input type="password" name="pwd" id="pwd" class="form-control"
                   placeholder="새 비밀번호를 입력하세요" autocomplete="new-password">
          </div>

          <!-- 비밀번호 확인 -->
          <div class="form-group">
            <label class="form-label" for="pwd2">비밀번호 확인</label>
            <input type="password" name="pwd2" id="pwd2" class="form-control"
                   placeholder="비밀번호를 다시 입력하세요" autocomplete="new-password">
          </div>

          <button type="button" id="btn" class="btn-submit">비밀번호 변경</button>
        </form>

        <div class="pwd-hint">
          변경된 비밀번호는 다음 로그인부터 바로 적용됩니다.
        </div>

      </div>
    </div>

    <!-- 알림 모달 (pwdset.js 의존 — 구조 변경 금지) -->
    <div class="modal normal">
      <div class="modal_body">
        <div>
          <img class="menu_icon" th:src="@{/icon/ev/alert_img.png}" onerror="this.style.display='none'">
          <div class="menu_msg">text</div>
          <div class="modal_footer">
            <div class="btn modal_btn" onclick="closePopup()">확인</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-latest.min.js"></script>
  <div th:replace="~{Include/layout :: scripts}"></div>
  <script th:src="@{/js/user/pwdset.js(v=${#dates.createNow().time})}" defer></script>
</body>
</html>
