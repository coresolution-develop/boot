<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:attr="data-collapsed=${sidebarCollapsed ? 'true' : 'false'}"
      th:styleappend="|--nav-w:${sidebarCollapsed ? '70px' : '240px'}|">
<head>
  <meta charset="UTF-8">
  <title>기관 관리 | 슈퍼 어드민</title>
  <link rel="stylesheet" th:href="@{/css/css.css}">
  <link rel="stylesheet" th:href="@{/css/leftMenu.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
  <link rel="shortcut icon" th:href="@{/favicon/favicon.ico}">
  <style>
    .main-inner { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }
    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
    .page-title  { font-size:22px; font-weight:700; color:#1e293b; }
    .btn-primary { background:#1b304a; color:#fff; border:none; padding:9px 18px;
                   border-radius:7px; font-size:13px; font-weight:600; cursor:pointer; text-decoration:none;
                   display:inline-flex; align-items:center; gap:6px; }
    .btn-primary:hover { filter:brightness(1.15); }

    .card { background:#fff; border:1px solid #e5e9ef; border-radius:12px;
            padding:0; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.04); }

    /* 알림 박스 */
    .alert { padding:12px 16px; border-radius:8px; margin-bottom:16px; font-size:13px; }
    .alert-success { background:#f0fdf4; border:1px solid #bbf7d0; color:#166534; }
    .alert-danger  { background:#fef2f2; border:1px solid #fecaca; color:#991b1b; }

    /* 테이블 */
    .inst-table { width:100%; border-collapse:collapse; font-size:13px; }
    .inst-table th { background:#1b304a; color:#fff; padding:12px 14px;
                     text-align:left; font-weight:600; white-space:nowrap; }
    .inst-table td { padding:11px 14px; border-bottom:1px solid #f1f5f9;
                     vertical-align:middle; color:#374151; }
    .inst-table tr:hover td { background:#f8fafc; }
    .inst-table tr:last-child td { border-bottom:none; }

    .badge-active   { background:#dcfce7; color:#166534; padding:3px 9px;
                      border-radius:20px; font-size:11px; font-weight:600; }
    .badge-inactive { background:#f1f5f9; color:#64748b; padding:3px 9px;
                      border-radius:20px; font-size:11px; font-weight:600; }

    .actions { display:flex; gap:6px; flex-wrap:wrap; }
    .btn-sm  { padding:5px 11px; border-radius:5px; font-size:12px; font-weight:600;
               cursor:pointer; border:1px solid; text-decoration:none;
               display:inline-flex; align-items:center; }
    .btn-edit    { background:#fff; border-color:#cbd5e1; color:#374151; }
    .btn-edit:hover { background:#f8fafc; }
    .btn-admins  { background:#eff6ff; border-color:#93c5fd; color:#1d4ed8; }
    .btn-admins:hover { background:#dbeafe; }
    .btn-deact   { background:#fff; border-color:#fca5a5; color:#dc2626; }
    .btn-deact:hover { background:#fef2f2; }
    .btn-act     { background:#f0fdf4; border-color:#86efac; color:#16a34a; }
    .btn-act:hover { background:#dcfce7; }

    .empty-state { text-align:center; padding:60px 20px; color:#94a3b8; }
    .empty-state .icon { font-size:40px; margin-bottom:10px; }
  </style>
</head>
<body>
<div th:replace="~{Include/layout :: header}"></div>
<div th:replace="~{Include/layout :: nav_section}"></div>

<div class="main-content">
<div class="main-inner">

  <div class="page-header">
    <h1 class="page-title">🏥 기관 관리</h1>
    <a th:href="@{/admin/institutions/new}" class="btn-primary">+ 기관 등록</a>
  </div>

  <!-- 알림 -->
  <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
  <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

  <div class="card">
    <table class="inst-table">
      <thead>
        <tr>
          <th style="width:50px">ID</th>
          <th>기관명</th>
          <th>기관 코드</th>
          <th style="width:80px">상태</th>
          <th>등록일</th>
          <th style="width:260px">작업</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${institutions.isEmpty()}">
          <td colspan="6">
            <div class="empty-state">
              <div class="icon">🏥</div>
              <p>등록된 기관이 없습니다. 기관을 먼저 등록해주세요.</p>
            </div>
          </td>
        </tr>
        <tr th:each="inst : ${institutions}">
          <td th:text="${inst.id}" style="color:#94a3b8; font-size:12px;"></td>
          <td style="font-weight:600;" th:text="${inst.name}"></td>
          <td><code style="background:#f1f5f9; padding:2px 7px; border-radius:4px; font-size:12px;"
                    th:text="${inst.code}"></code></td>
          <td>
            <span th:if="${inst.isActive}"  class="badge-active">활성</span>
            <span th:unless="${inst.isActive}" class="badge-inactive">비활성</span>
          </td>
          <td style="color:#64748b; font-size:12px;"
              th:text="${#dates.format(inst.createdAt,'yyyy-MM-dd')}"></td>
          <td>
            <div class="actions">
              <a th:href="@{/admin/institutions/{id}/edit(id=${inst.id})}"
                 class="btn-sm btn-edit">✏️ 수정</a>
              <a th:href="@{/admin/institutions/{id}/admins(id=${inst.id})}"
                 class="btn-sm btn-admins">👤 관리자</a>
              <form th:if="${inst.isActive}"
                    th:action="@{/admin/institutions/{id}/deactivate(id=${inst.id})}"
                    method="post" style="display:inline"
                    onsubmit="return confirm('기관을 비활성화하시겠습니까?')">
                <button type="submit" class="btn-sm btn-deact">🔒 비활성화</button>
              </form>
              <form th:unless="${inst.isActive}"
                    th:action="@{/admin/institutions/{id}/activate(id=${inst.id})}"
                    method="post" style="display:inline">
                <button type="submit" class="btn-sm btn-act">🔓 활성화</button>
              </form>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
</div>
<script src="https://code.jquery.com/jquery-latest.min.js"></script>
<div th:replace="~{Include/layout :: scripts}"></div>
</body>
</html>
