<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:attr="data-collapsed=${sidebarCollapsed ? 'true' : 'false'}"
      th:styleappend="|--nav-w:${sidebarCollapsed ? '70px' : '240px'}|">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>기관 관리자 관리 | 최고 관리자</title>
  <link rel="stylesheet" th:href="@{/css/css.css}">
  <link rel="stylesheet" th:href="@{/css/leftMenu.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
  <link rel="shortcut icon" th:href="@{/favicon/favicon.ico}">
  <script>(function(){ document.documentElement.setAttribute('data-first-paint',''); })();</script>
  <style>
    .main-inner  { max-width:1000px; margin:0 auto; padding:24px 20px; }
    .breadcrumb  { font-size:13px; color:#64748b; margin-bottom:6px; }
    .breadcrumb a { color:#3b82f6; text-decoration:none; }
    .breadcrumb a:hover { text-decoration:underline; }
    .page-title  { font-size:22px; font-weight:700; color:#1e293b; margin-bottom:20px; }
    .inst-badge  { background:#eff6ff; color:#1d4ed8; padding:3px 10px;
                   border-radius:20px; font-size:12px; font-weight:600; margin-left:8px; }

    .card { background:#fff; border:1px solid #e5e9ef; border-radius:12px;
            padding:24px 28px; margin-bottom:20px;
            box-shadow:0 2px 8px rgba(0,0,0,.04); }
    .card-title { font-size:16px; font-weight:700; color:#1e293b; margin:0 0 16px; }

    .alert { padding:12px 16px; border-radius:8px; margin-bottom:16px; font-size:13px; }
    .alert-success { background:#f0fdf4; border:1px solid #bbf7d0; color:#166534; }
    .alert-danger  { background:#fef2f2; border:1px solid #fecaca; color:#991b1b; }

    /* 기존 관리자 테이블 */
    .admin-table { width:100%; border-collapse:collapse; font-size:13px; }
    .admin-table th { background:#0f172a; color:#e2e8f0; padding:10px 12px;
                      text-align:left; font-weight:600; white-space:nowrap; }
    .admin-table td { padding:10px 12px; border-bottom:1px solid #f1f5f9;
                      vertical-align:middle; color:#374151; }
    .admin-table tr:hover td { background:#f8fafc; }
    .admin-table tr:last-child td { border-bottom:none; }

    .badge-active   { background:#dcfce7; color:#166534; padding:2px 8px;
                      border-radius:20px; font-size:11px; font-weight:600; }
    .badge-inactive { background:#f1f5f9; color:#64748b; padding:2px 8px;
                      border-radius:20px; font-size:11px; font-weight:600; }

    .actions { display:flex; gap:6px; flex-wrap:wrap; }
    .btn-sm  { padding:4px 10px; border-radius:5px; font-size:12px; font-weight:600;
               cursor:pointer; border:1px solid; background:#fff; }
    .btn-danger  { border-color:#fca5a5; color:#dc2626; }
    .btn-danger:hover { background:#fef2f2; }
    .btn-success { border-color:#86efac; color:#16a34a; }
    .btn-success:hover { background:#f0fdf4; }
    .btn-warning { border-color:#fcd34d; color:#92400e; background:#fffbeb; }
    .btn-warning:hover { background:#fef3c7; }

    /* 신규 생성 폼 */
    .create-form { display:grid; grid-template-columns:1fr 1fr; gap:12px 16px; }
    @media(max-width:640px) { .create-form { grid-template-columns:1fr; } }
    .form-group { display:flex; flex-direction:column; gap:4px; }
    .form-label { font-size:12px; font-weight:600; color:#374151; }
    .form-control { padding:8px 11px; border:1px solid #d1d5db; border-radius:6px;
                    font-size:13px; transition:border-color .15s; }
    .form-control:focus { outline:none; border-color:#3b82f6; }
    .btn-create { background:#1b304a; color:#fff; border:none; padding:9px 20px;
                  border-radius:7px; font-size:13px; font-weight:600; cursor:pointer;
                  grid-column:1/-1; width:fit-content; }
    .btn-create:hover { filter:brightness(1.15); }

    /* 비밀번호 재설정 인라인 폼 */
    .pwd-reset-form { display:flex; gap:6px; align-items:center; }
    .pwd-reset-form input { padding:4px 8px; border:1px solid #d1d5db;
                            border-radius:5px; font-size:12px; width:140px; }

    .empty-state { text-align:center; padding:40px; color:#94a3b8; }
  </style>
</head>
<body>
<div th:replace="~{Include/super-admin-layout :: header}"></div>
<div th:replace="~{Include/super-admin-layout :: nav_section}"></div>

<div class="main-content">
<div class="main-inner">

  <p class="breadcrumb">
    <a th:href="@{/admin/institutions}">기관 관리</a> &rsaquo; 관리자 관리
  </p>
  <h1 class="page-title">
    기관 관리자
    <span class="inst-badge" th:text="${institution.name}"></span>
  </h1>

  <!-- 알림 -->
  <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
  <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>

  <!-- ── 기존 관리자 목록 ── -->
  <div class="card">
    <p class="card-title">등록된 관리자 계정</p>
    <div th:if="${admins.isEmpty()}" class="empty-state">
      <p>등록된 관리자가 없습니다. 아래 폼으로 계정을 생성해주세요.</p>
    </div>
    <table th:unless="${admins.isEmpty()}" class="admin-table">
      <thead>
        <tr>
          <th>로그인 ID</th>
          <th>성명</th>
          <th>상태</th>
          <th>등록일</th>
          <th>비밀번호 재설정</th>
          <th>작업</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="admin : ${admins}">
          <td style="font-weight:600;" th:text="${admin.loginId}"></td>
          <td th:text="${admin.name}"></td>
          <td>
            <span th:if="${admin.isActive}"  class="badge-active">활성</span>
            <span th:unless="${admin.isActive}" class="badge-inactive">비활성</span>
          </td>
          <td style="color:#64748b; font-size:12px;"
              th:text="${#dates.format(admin.createdAt,'yyyy-MM-dd')}"></td>
          <td>
            <form th:action="@{/admin/institutions/{id}/admins/{adminId}/reset-pwd(id=${institution.id},adminId=${admin.id})}"
                  method="post" class="pwd-reset-form">
              <input type="password" name="newPassword" placeholder="새 비밀번호" required minlength="6">
              <button type="submit" class="btn-sm btn-warning"
                      onclick="return confirm('비밀번호를 재설정하시겠습니까?')">초기화</button>
            </form>
          </td>
          <td>
            <div class="actions">
              <form th:if="${admin.isActive}"
                    th:action="@{/admin/institutions/{id}/admins/{adminId}/deactivate(id=${institution.id},adminId=${admin.id})}"
                    method="post">
                <button type="submit" class="btn-sm btn-danger"
                        onclick="return confirm('관리자 계정을 비활성화하시겠습니까?')">비활성화</button>
              </form>
              <form th:unless="${admin.isActive}"
                    th:action="@{/admin/institutions/{id}/admins/{adminId}/activate(id=${institution.id},adminId=${admin.id})}"
                    method="post">
                <button type="submit" class="btn-sm btn-success">활성화</button>
              </form>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- ── 관리자 계정 신규 생성 ── -->
  <div class="card">
    <p class="card-title">관리자 계정 추가</p>
    <form th:action="@{/admin/institutions/{id}/admins(id=${institution.id})}"
          method="post" class="create-form">

      <div class="form-group">
        <label class="form-label">로그인 ID <span style="color:#ef4444">*</span></label>
        <input type="text" name="loginId" class="form-control"
               placeholder="예: admin_hyosj" required>
      </div>

      <div class="form-group">
        <label class="form-label">성명 <span style="color:#ef4444">*</span></label>
        <input type="text" name="adminName" class="form-control"
               placeholder="예: 홍길동" required>
      </div>

      <div class="form-group">
        <label class="form-label">비밀번호 <span style="color:#ef4444">*</span></label>
        <input type="password" name="password" class="form-control"
               placeholder="6자 이상" required minlength="6">
      </div>

      <div class="form-group">
        <label class="form-label">비밀번호 확인 <span style="color:#ef4444">*</span></label>
        <input type="password" id="confirmPwd" class="form-control"
               placeholder="동일하게 입력" required minlength="6">
      </div>

      <button type="submit" class="btn-create"
              onclick="return validatePwd()">계정 생성</button>
    </form>
  </div>

</div>
</div>
<div th:replace="~{Include/super-admin-layout :: scripts}"></div>
<script>
function validatePwd() {
  const pwd  = document.querySelector('input[name="password"]').value;
  const conf = document.getElementById('confirmPwd').value;
  if (pwd !== conf) { alert('비밀번호가 일치하지 않습니다.'); return false; }
  return true;
}
</script>
</body>
</html>
