<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:attr="data-collapsed=${sidebarCollapsed ? 'true' : 'false'}"
      th:styleappend="|--nav-w:${sidebarCollapsed ? '70px' : '240px'}|">
<head th:replace="~{Include/aff-inst-admin-layout :: head('대시보드')}"></head>
<body>
<div th:replace="~{Include/aff-inst-admin-layout :: header}"></div>
<div th:replace="~{Include/aff-inst-admin-layout :: nav_section}"></div>

<div class="main-content">
<div style="max-width:1100px; margin:0 auto; padding:28px 20px;">
<style>
.db-banner {
  background: linear-gradient(135deg, #1a3a5c 0%, #2563eb 100%);
  border-radius: 16px; padding: 28px 32px; margin-bottom: 24px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; flex-wrap: wrap;
  box-shadow: 0 4px 20px rgba(37,99,235,.25);
}
.db-banner-left h1 { font-size: 22px; font-weight: 800; color: #fff; margin: 0 0 4px; }
.db-banner-left p  { font-size: 13px; color: rgba(255,255,255,.7); margin: 0; }
.db-year-badge {
  background: rgba(255,255,255,.15); border-radius: 8px;
  padding: 8px 16px; font-size: 18px; font-weight: 800; color: #fff;
}

.kpi-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px; margin-bottom: 24px;
}
.kpi-card {
  background: #fff; border: 1px solid #e5e9ef;
  border-radius: 12px; padding: 20px 22px;
  box-shadow: 0 2px 8px rgba(0,0,0,.04);
}
.kpi-label { font-size: 12px; font-weight: 600; color: #64748b;
             text-transform: uppercase; letter-spacing:.05em; margin:0 0 8px; }
.kpi-value { font-size: 32px; font-weight: 800; color: #1e293b; line-height:1; margin:0 0 4px; }
.kpi-detail{ font-size: 12px; color: #94a3b8; margin: 0; }
.kpi-card.blue   { border-left: 4px solid #3b82f6; }
.kpi-card.green  { border-left: 4px solid #22c55e; }
.kpi-card.amber  { border-left: 4px solid #f59e0b; }
.kpi-card.rose   { border-left: 4px solid #f43f5e; }

.section-title { font-size: 16px; font-weight: 700; color: #1e293b; margin: 0 0 14px; }

.prog-bar-wrap {
  background: #f1f5f9; border-radius: 8px;
  padding: 20px 24px; display: flex; align-items: center; gap: 18px;
}
.prog-bar-bg { flex: 1; height: 12px; background: #e2e8f0; border-radius: 999px; overflow:hidden; }
.prog-bar-fg { height: 100%; background: linear-gradient(90deg, #3b82f6, #22c55e); border-radius: 999px; }
.prog-pct   { font-size: 24px; font-weight: 800; color: #1e293b; white-space:nowrap; }

.quick-links {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px; margin-top: 20px;
}
.quick-link {
  display: flex; align-items: center; gap: 10px;
  background: #fff; border: 1px solid #e5e9ef;
  border-radius: 10px; padding: 14px 16px;
  text-decoration: none; color: #1e293b;
  font-size: 13px; font-weight: 600;
  transition: box-shadow .15s, border-color .15s;
}
.quick-link:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); border-color: #93c5fd; }
.quick-link svg  { flex-shrink: 0; color: #3b82f6; }
</style>

  <!-- 배너 -->
  <div class="db-banner">
    <div class="db-banner-left">
      <h1 th:text="${institutionName + ' 관리자'}">기관 관리자</h1>
      <p>계열사 기관 관리자 대시보드입니다.</p>
    </div>
    <div class="db-year-badge" th:text="${year + '년'}">2026년</div>
  </div>

  <!-- KPI 카드 -->
  <div class="kpi-row">
    <div class="kpi-card blue">
      <p class="kpi-label">전체 직원</p>
      <p class="kpi-value" th:text="${totalUsers}">0</p>
      <p class="kpi-detail">평가 대상 포함</p>
    </div>
    <div class="kpi-card green">
      <p class="kpi-label">평가 완료</p>
      <p class="kpi-value" th:text="${completed}">0</p>
      <p class="kpi-detail">전체 대상 평가 제출 완료</p>
    </div>
    <div class="kpi-card amber">
      <p class="kpi-label">진행 중</p>
      <p class="kpi-value" th:text="${inProgress}">0</p>
      <p class="kpi-detail">일부 평가 완료</p>
    </div>
    <div class="kpi-card rose">
      <p class="kpi-label">미시작</p>
      <p class="kpi-value" th:text="${notStarted}">0</p>
      <p class="kpi-detail">평가 미제출</p>
    </div>
  </div>

  <!-- 전체 진행률 -->
  <p class="section-title">전체 평가 진행률</p>
  <div class="prog-bar-wrap">
    <div class="prog-bar-bg">
      <div class="prog-bar-fg"
           th:style="|width:${overallProgress}%|"></div>
    </div>
    <span class="prog-pct" th:text="${overallProgress + '%'}">0%</span>
  </div>

  <!-- 바로가기 -->
  <p class="section-title" style="margin-top:24px">바로가기</p>
  <div class="quick-links">
    <a th:href="@{/aff/inst-admin/progress(year=${year})}" class="quick-link">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      진행률 현황
    </a>
    <a th:href="@{/aff/inst-admin/evalrelease}" class="quick-link">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      평가 창구 설정
    </a>
  </div>

</div>
</div>
<div th:replace="~{Include/aff-inst-admin-layout :: scripts}"></div>
</body>
</html>
