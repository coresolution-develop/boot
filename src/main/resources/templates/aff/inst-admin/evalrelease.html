<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:attr="data-collapsed=${sidebarCollapsed ? 'true' : 'false'}"
      th:styleappend="|--nav-w:${sidebarCollapsed ? '70px' : '240px'}|">
<head th:replace="~{Include/aff-inst-admin-layout :: head('평가 창구 설정')}"></head>
<body>
<div th:replace="~{Include/aff-inst-admin-layout :: header}"></div>
<div th:replace="~{Include/aff-inst-admin-layout :: nav_section}"></div>

<div class="main-content">
<div style="max-width:1100px; margin:0 auto; padding:24px 20px 60px;">
<style>
/* ── 공통 ── */
.card { background:#fff; border:1px solid #e5e9ef; border-radius:12px;
        padding:20px 24px; margin-bottom:18px; box-shadow:0 2px 8px rgba(0,0,0,.04); }
.card-title { font-size:15px; font-weight:700; color:#1e293b; margin:0 0 16px;
              display:flex; align-items:center; gap:8px; }
.badge { padding:3px 12px; border-radius:20px; font-size:12px; font-weight:600; }
.badge-green { background:#f0fdf4; border:1px solid #86efac; color:#166534; }
.badge-blue  { background:#eff6ff; border:1px solid #bfdbfe; color:#1d4ed8; }
.btn { display:inline-flex; align-items:center; gap:6px; height:36px; padding:0 16px;
       border-radius:8px; font-size:13px; font-weight:600; cursor:pointer;
       border:1px solid; transition:filter .12s, background .12s; }
.btn-primary { background:#1b304a; border-color:#1b304a; color:#fff; }
.btn-primary:hover { filter:brightness(1.15); }
.btn-back { background:#fff; border-color:#d0d7de; color:#374151; }
.btn-back:hover { background:#f8fafc; }
.btn-sm { height:28px; padding:0 10px; font-size:12px; border-radius:6px; font-weight:600;
          cursor:pointer; border:1px solid; display:inline-flex; align-items:center; gap:4px; }
.btn-toggle-on  { background:#dcfce7; border-color:#86efac; color:#166534; }
.btn-toggle-off { background:#fee2e2; border-color:#fca5a5; color:#dc2626; }
.btn-edit   { background:#eff6ff; border-color:#bfdbfe; color:#1d4ed8; }
.btn-del    { background:#fff; border-color:#fca5a5; color:#dc2626; }

/* ── 폼 그리드 ── */
.form-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:14px; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-label { font-size:11px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.04em; }
.form-control {
  height:36px; border:1.5px solid #e2e8f0; border-radius:8px;
  padding:0 10px; font-size:13px; color:#1e293b; outline:none; background:#fff;
  transition:border-color .15s; width:100%; box-sizing:border-box;
}
.form-control:focus { border-color:#3b82f6; box-shadow:0 0 0 3px rgba(59,130,246,.1); }
select.form-control { cursor:pointer; }
.form-control[type=datetime-local] { font-size:12px; }

/* ── 상태 칩 ── */
.chip { display:inline-flex; align-items:center; gap:4px; padding:2px 10px;
        border-radius:20px; font-size:11px; font-weight:600; white-space:nowrap; }
.chip-on  { background:#dcfce7; color:#166534; border:1px solid #86efac; }
.chip-off { background:#f1f5f9; color:#64748b; border:1px solid #e2e8f0; }
.chip-active { background:#dbeafe; color:#1d4ed8; border:1px solid #bfdbfe; }
.chip-closed { background:#fee2e2; color:#dc2626; border:1px solid #fecaca; }
.chip-sched  { background:#fef9c3; color:#854d0e; border:1px solid #fde68a; }

/* ── 테이블 ── */
.tbl-wrap { border:1px solid #e5e9ef; border-radius:10px; overflow:hidden; }
.tbl-scroll { overflow-x:auto; }
.data-table { width:100%; border-collapse:collapse; font-size:12.5px; white-space:nowrap; }
.data-table thead th {
  position:sticky; top:0; z-index:2;
  background:#f3f6fa; font-weight:600; color:#374151;
  border-bottom:2px solid #dfe4ea; padding:9px 12px; text-align:left;
}
.data-table tbody td { padding:8px 12px; border-bottom:1px solid #f1f4f8; color:#1e293b; vertical-align:middle; }
.data-table tbody tr:hover td { background:#f5f8ff; }
.data-table tbody tr:last-child td { border-bottom:none; }
.data-table td.actions { display:flex; gap:6px; align-items:center; flex-wrap:nowrap; }

/* ── 빈 상태 ── */
.empty-state { text-align:center; padding:40px 20px; color:#94a3b8; font-size:13px; }

/* ── 필터 바 ── */
.filter-bar { display:flex; gap:10px; align-items:center; margin-bottom:16px; flex-wrap:wrap; }
.filter-bar select { height:34px; border:1.5px solid #e2e8f0; border-radius:8px;
                     padding:0 10px; font-size:13px; color:#1e293b; outline:none;
                     background:#fff; cursor:pointer; }

/* ── 힌트 ── */
.hint-box { background:#eff6ff; border:1px solid #bfdbfe; border-radius:8px;
            padding:10px 14px; font-size:12px; color:#1d4ed8; line-height:1.7; margin-bottom:18px; }
</style>

<!-- 페이지 헤더 -->
<div style="display:flex; align-items:center; gap:10px; margin-bottom:20px; flex-wrap:wrap;">
  <a th:href="@{/aff/inst-admin/dashboard(year=${currentYear})}" class="btn btn-back" style="height:34px;font-size:13px">← 대시보드</a>
  <h1 style="font-size:20px; font-weight:700; color:#1e293b; margin:0;">평가 창구 설정</h1>
  <span class="badge badge-green" th:text="${institutionName}">기관명</span>
  <span class="badge badge-blue"  th:text="${currentYear}+'년도'">2026년도</span>
</div>

<div class="hint-box">
  평가 오픈·마감 기간을 설정합니다. 설정된 기간 동안만 직원이 해당 평가를 제출할 수 있습니다.<br>
  유형(AA/AB)과 관계(A~G)를 조합하여 세부 창구를 구성하세요.
</div>

<!-- ── 신규 등록 폼 ── -->
<div class="card">
  <p class="card-title">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
    </svg>
    창구 등록
  </p>

  <div class="form-grid">
    <div class="form-group">
      <label class="form-label">연도</label>
      <input class="form-control" type="number" id="f-year" th:value="${currentYear}" min="2020" max="2100">
    </div>
    <div class="form-group">
      <label class="form-label">평가 유형</label>
      <select class="form-control" id="f-type">
        <option value="AA">AA — 10문항</option>
        <option value="AB">AB — 20문항</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">평가 관계 (ev)</label>
      <select class="form-control" id="f-ev">
        <option value="A">A — 의료리더 → 의료직군</option>
        <option value="B">B — 의료직군 → 경혁팀</option>
        <option value="C">C — 경혁팀 → 의료직군</option>
        <option value="D">D — 경혁팀 → 경혁팀</option>
        <option value="E">E — 부서장 → 부서원</option>
        <option value="F">F — 부서원 → 부서장</option>
        <option value="G">G — 부서원 → 부서원</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">오픈 일시</label>
      <input class="form-control" type="datetime-local" id="f-open">
    </div>
    <div class="form-group">
      <label class="form-label">마감 일시</label>
      <input class="form-control" type="datetime-local" id="f-close">
    </div>
    <div class="form-group" style="justify-content:flex-end;">
      <label class="form-label">&nbsp;</label>
      <button class="btn btn-primary" id="btn-upsert" style="height:36px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
        </svg>
        저장
      </button>
    </div>
  </div>
</div>

<!-- ── 목록 ── -->
<div class="card" style="padding:0;">
  <div style="padding:16px 20px 12px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;">
    <p class="card-title" style="margin:0;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
        <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      등록된 창구 목록
    </p>
    <div class="filter-bar" style="margin:0;">
      <select id="filter-year">
        <option value="">연도 전체</option>
      </select>
      <select id="filter-type">
        <option value="">유형 전체</option>
        <option value="AA">AA</option>
        <option value="AB">AB</option>
      </select>
      <select id="filter-ev">
        <option value="">관계 전체</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
        <option value="D">D</option>
        <option value="E">E</option>
        <option value="F">F</option>
        <option value="G">G</option>
      </select>
      <button class="btn btn-back" id="btn-refresh" style="height:34px;">새로고침</button>
    </div>
  </div>

  <div class="tbl-wrap">
    <div class="tbl-scroll">
      <table class="data-table">
        <thead>
          <tr>
            <th>연도</th>
            <th>유형</th>
            <th>관계</th>
            <th>오픈</th>
            <th>마감</th>
            <th>상태</th>
            <th>활성</th>
            <th style="width:130px;">액션</th>
          </tr>
        </thead>
        <tbody id="tbl-body">
          <tr>
            <td colspan="8">
              <div class="empty-state">목록을 불러오는 중...</div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ── 수정 모달 ── -->
<div id="edit-modal-ov" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.45);
     z-index:1000; display:flex; align-items:center; justify-content:center;" hidden>
  <div style="background:#fff; border-radius:14px; padding:28px 28px 24px; width:560px; max-width:95vw;
              box-shadow:0 20px 60px rgba(0,0,0,.25); position:relative;">
    <h3 style="font-size:16px; font-weight:700; color:#1e293b; margin:0 0 20px;">창구 수정</h3>

    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">연도</label>
        <input class="form-control" type="number" id="e-year" readonly style="background:#f8fafc;">
      </div>
      <div class="form-group">
        <label class="form-label">평가 유형</label>
        <select class="form-control" id="e-type">
          <option value="AA">AA — 10문항</option>
          <option value="AB">AB — 20문항</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">평가 관계</label>
        <select class="form-control" id="e-ev">
          <option value="A">A</option><option value="B">B</option>
          <option value="C">C</option><option value="D">D</option>
          <option value="E">E</option><option value="F">F</option>
          <option value="G">G</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">오픈 일시</label>
        <input class="form-control" type="datetime-local" id="e-open">
      </div>
      <div class="form-group">
        <label class="form-label">마감 일시</label>
        <input class="form-control" type="datetime-local" id="e-close">
      </div>
    </div>

    <div style="display:flex; gap:10px; margin-top:20px; justify-content:flex-end;">
      <button class="btn btn-back" id="edit-cancel">취소</button>
      <button class="btn btn-primary" id="edit-save">저장</button>
    </div>
    <input type="hidden" id="e-id">
  </div>
</div>

</div>
</div>

<div th:replace="~{Include/aff-inst-admin-layout :: scripts}"></div>
<script th:inline="javascript">
/*<![CDATA[*/
const BASE      = /*[[@{/aff/inst-admin/evalrelease}]]*/ '/aff/inst-admin/evalrelease';
const CY        = /*[[${currentYear}]]*/ 2026;
const CSRF_H    = document.querySelector('meta[name="_csrf_header"]')?.content;
const CSRF_T    = document.querySelector('meta[name="_csrf"]')?.content;
/*]]>*/

// ── 공통 fetch 헬퍼 ──
function api(url, method, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (CSRF_H && CSRF_T) headers[CSRF_H] = CSRF_T;
  return fetch(url, { method, headers, body: body ? JSON.stringify(body) : undefined })
         .then(r => r.json());
}
function apiPost(path, params) {
  const headers = { 'Content-Type': 'application/x-www-form-urlencoded' };
  if (CSRF_H && CSRF_T) headers[CSRF_H] = CSRF_T;
  const qs = new URLSearchParams(params).toString();
  return fetch(BASE + path, { method: 'POST', headers, body: qs }).then(r => r.json());
}

// ── 연도 필터 드롭다운 초기화 ──
(function initYearFilter() {
  const sel = document.getElementById('filter-year');
  for (let y = CY; y >= 2023; y--) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y + '년';
    if (y === CY) o.selected = true;
    sel.appendChild(o);
  }
})();

// ── 날짜 포맷 헬퍼 ──
function fmtDt(iso) {
  if (!iso) return '-';
  return iso.replace('T', ' ').substring(0, 16);
}
function toInput(iso) {
  if (!iso) return '';
  return iso.substring(0, 16);
}
function nowStatus(openAt, closeAt, enabled) {
  if (!enabled) return '<span class="chip chip-off">비활성</span>';
  const now = new Date();
  const open  = openAt  ? new Date(openAt)  : null;
  const close = closeAt ? new Date(closeAt) : null;
  if (!open || !close) return '<span class="chip chip-off">-</span>';
  if (now < open)  return '<span class="chip chip-sched">예정</span>';
  if (now > close) return '<span class="chip chip-closed">마감</span>';
  return '<span class="chip chip-active">진행중</span>';
}

// ── 목록 로드 ──
function loadList() {
  const year = document.getElementById('filter-year').value;
  const type = document.getElementById('filter-type').value;
  const ev   = document.getElementById('filter-ev').value;

  let url = BASE + '/list?size=100&page=0';
  if (year) url += '&year=' + year;
  if (type) url += '&type=' + type;
  if (ev)   url += '&ev='   + ev;

  fetch(url).then(r => r.json()).then(data => {
    const tbody = document.getElementById('tbl-body');
    const rows  = data.rows || [];
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state">등록된 창구가 없습니다.</div></td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(r => `
      <tr data-id="${r.id}">
        <td>${r.evalYear}</td>
        <td><span class="chip chip-on" style="font-size:10px;">${r.dataType ?? '-'}</span></td>
        <td><strong>${r.dataEv ?? '-'}</strong></td>
        <td style="font-size:11px; color:#475569;">${fmtDt(r.openAt)}</td>
        <td style="font-size:11px; color:#475569;">${fmtDt(r.closeAt)}</td>
        <td>${nowStatus(r.openAt, r.closeAt, r.enabled)}</td>
        <td>
          <button class="btn-sm ${r.enabled ? 'btn-toggle-on' : 'btn-toggle-off'}"
                  onclick="toggleRow(${r.id}, ${!r.enabled})">
            ${r.enabled ? '활성' : '비활성'}
          </button>
        </td>
        <td class="actions">
          <button class="btn-sm btn-edit" onclick="openEdit(${r.id})">수정</button>
          <button class="btn-sm btn-del"  onclick="deleteRow(${r.id})">삭제</button>
        </td>
      </tr>`).join('');
  }).catch(() => {
    document.getElementById('tbl-body').innerHTML =
      '<tr><td colspan="8"><div class="empty-state">목록 조회에 실패했습니다.</div></td></tr>';
  });
}

// ── 저장 ──
document.getElementById('btn-upsert').addEventListener('click', function () {
  const body = {
    evalYear: parseInt(document.getElementById('f-year').value),
    dataType: document.getElementById('f-type').value,
    dataEv:   document.getElementById('f-ev').value,
    openAt:   document.getElementById('f-open').value.replace('T', ' ') + ':00',
    closeAt:  document.getElementById('f-close').value.replace('T', ' ') + ':00',
    enabled:  true
  };
  if (!body.openAt || !body.closeAt || body.openAt === ':00' || body.closeAt === ':00') {
    showAlert('오픈·마감 일시를 모두 입력해주세요.');
    return;
  }
  api(BASE + '/upsert', 'POST', body)
    .then(j => {
      if (j.result === 'ok') { loadList(); showAlert('저장되었습니다.'); }
      else showAlert('오류: ' + (j.message || '저장 실패'));
    });
});

// ── 토글 ──
function toggleRow(id, enabled) {
  const msg = enabled ? '이 창구를 활성화하시겠습니까?' : '이 창구를 비활성화하시겠습니까?';
  showConfirm(msg, function () {
    apiPost('/toggle/' + id, { enabled }).then(() => loadList());
  });
}

// ── 삭제 ──
function deleteRow(id) {
  showConfirm('이 창구를 삭제하시겠습니까?', function () {
    apiPost('/delete/' + id, {})
      .then(() => loadList());
  }, { danger: true, okLabel: '삭제' });
}

// ── 수정 모달 ──
let editRows = {};
function openEdit(id) {
  fetch(BASE + '/list?size=200&page=0')
    .then(r => r.json())
    .then(data => {
      const row = (data.rows || []).find(r => r.id === id);
      if (!row) return;
      document.getElementById('e-id').value    = row.id;
      document.getElementById('e-year').value  = row.evalYear;
      document.getElementById('e-type').value  = row.dataType;
      document.getElementById('e-ev').value    = row.dataEv;
      document.getElementById('e-open').value  = toInput(row.openAt);
      document.getElementById('e-close').value = toInput(row.closeAt);
      const ov = document.getElementById('edit-modal-ov');
      ov.hidden = false; ov.style.display = 'flex';
    });
}

document.getElementById('edit-cancel').addEventListener('click', closeEditModal);
document.getElementById('edit-modal-ov').addEventListener('click', function (e) {
  if (e.target === this) closeEditModal();
});
function closeEditModal() {
  const ov = document.getElementById('edit-modal-ov');
  ov.hidden = true; ov.style.display = 'none';
}

document.getElementById('edit-save').addEventListener('click', function () {
  const id = parseInt(document.getElementById('e-id').value);
  const body = {
    evalYear: parseInt(document.getElementById('e-year').value),
    dataType: document.getElementById('e-type').value,
    dataEv:   document.getElementById('e-ev').value,
    openAt:   document.getElementById('e-open').value.replace('T', ' ') + ':00',
    closeAt:  document.getElementById('e-close').value.replace('T', ' ') + ':00',
    enabled:  true
  };
  api(BASE + '/update/' + id, 'POST', body)
    .then(j => {
      if (j.result === 'ok') { closeEditModal(); loadList(); }
      else showAlert('오류: ' + (j.message || '수정 실패'));
    });
});

// ── 필터 변경 시 재조회 ──
['filter-year', 'filter-type', 'filter-ev'].forEach(id =>
  document.getElementById(id).addEventListener('change', loadList));
document.getElementById('btn-refresh').addEventListener('click', loadList);

// ── 초기 로드 ──
window.addEventListener('DOMContentLoaded', function () {
  document.body.classList.add('page-ready');
  loadList();
});
</script>
</body>
</html>
