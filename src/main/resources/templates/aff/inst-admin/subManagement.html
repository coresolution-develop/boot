<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:attr="data-collapsed=${sidebarCollapsed ? 'true' : 'false'}"
      th:styleappend="|--nav-w:${sidebarCollapsed ? '70px' : '240px'}|">
<head th:replace="~{Include/aff-inst-admin-layout :: head('부서 설정')}"></head>
<body>
<div th:replace="~{Include/aff-inst-admin-layout :: header}"></div>
<div th:replace="~{Include/aff-inst-admin-layout :: nav_section}"></div>

<div class="main-content">
<div style="max-width:900px; margin:0 auto; padding:20px;">
<style>
/* ── 카드 ── */
.card { background:#fff; border:1px solid #e5e9ef; border-radius:12px;
        padding:20px 24px; margin-bottom:16px;
        box-shadow:0 2px 8px rgba(0,0,0,.04);
        opacity:0; transform:translateY(10px); }
@keyframes card-rise { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
.page-ready .card { animation:card-rise .28s ease-out both; }
.page-ready .card:nth-child(2) { animation-delay:.05s; }
@media(prefers-reduced-motion:reduce){.card,.page-ready .card{animation:none;opacity:1;transform:none;}}

.card-title { font-size:18px; font-weight:700; color:#1e293b; margin:0 0 4px; }
.card-sub   { font-size:13px; color:#64748b; margin:0 0 16px; }

/* ── 기관명 뱃지 ── */
.inst-badge { background:#eff6ff; border:1px solid #93c5fd; color:#1d4ed8;
              padding:3px 12px; border-radius:20px; font-size:12px; font-weight:600; }

/* ── 통계 ── */
.stat-row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
.stat-chip { background:#f1f5f9; border:1px solid #e2e8f0; border-radius:20px;
             padding:4px 14px; font-size:12px; font-weight:600; color:#475569; }

/* ── 테이블 ── */
.table-wrap { border:1px solid #e5e9ef; border-radius:10px; overflow:hidden; }
.tbl-scroll { max-height:calc(100vh - 320px); overflow-y:auto; overflow-x:auto; }
.tbl-scroll::-webkit-scrollbar { width:6px; }
.tbl-scroll::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:4px; }
.data-table { width:100%; border-collapse:collapse; font-size:13px; }
.data-table thead th { position:sticky; top:0; z-index:2;
  background:#f3f6fa; font-weight:600; color:#374151;
  border-bottom:2px solid #dfe4ea; padding:10px 16px;
  white-space:nowrap; text-align:center; }
.data-table tbody td { padding:10px 16px; border-bottom:1px solid #f1f4f8;
  vertical-align:middle; color:#1e293b; }
.data-table tbody tr:hover td { background:#f5f8ff; }
.data-table tbody tr:last-child td { border-bottom:none; }

.col-no   { width:50px; text-align:center; color:#94a3b8; font-size:12px; }
.col-name { font-weight:600; }
.col-code { color:#475569; font-family:monospace; font-size:12px; text-align:center; }

/* ── 빈 상태 ── */
.empty-state { text-align:center; padding:48px 24px; color:#94a3b8; }
.empty-state .empty-icon { font-size:40px; margin-bottom:10px; }
.empty-state p { font-size:14px; margin:0; }

/* ── 안내 박스 ── */
.info-box { display:flex; align-items:flex-start; gap:10px;
            background:#eff6ff; border:1px solid #bfdbfe; border-radius:8px;
            padding:12px 14px; margin-bottom:16px; font-size:13px; color:#1d4ed8; }
.info-box .i-icon { font-size:16px; flex-shrink:0; margin-top:1px; }
</style>

  <!-- 페이지 헤더 -->
  <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
    <h1 style="font-size:20px; font-weight:700; color:#1e293b; margin:0;">부서 설정</h1>
    <span class="inst-badge" th:text="${institutionName}">기관명</span>
  </div>

  <!-- ① 안내 카드 -->
  <div class="card">
    <p class="card-title">등록된 부서 목록</p>
    <p class="card-sub">직원 업로드를 통해 부서가 자동 등록됩니다. 부서 수정이 필요하면 관리자에게 문의하세요.</p>

    <!-- 통계 -->
    <div class="stat-row">
      <span class="stat-chip" th:text="|총 ${subList != null ? subList.size() : 0}개 부서|">총 0개 부서</span>
      <span class="stat-chip" th:text="${year} + '년도'">2026년도</span>
    </div>

    <!-- 안내 -->
    <div class="info-box">
      <span class="i-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      </span>
      <div>
        부서 데이터는 <strong>직원 업로드</strong> 시 자동 생성됩니다.
        부서를 먼저 등록하거나 수정·삭제하려면
        <a th:href="@{/aff/inst-admin/userDataUpload(year=${year})}"
           style="color:#1d4ed8; font-weight:600;">직원 업로드</a> 페이지에서 부서 양식을 사용하세요.
      </div>
    </div>
  </div>

  <!-- ② 테이블 카드 -->
  <div class="card" style="padding:0;">
    <div class="table-wrap">
      <div class="tbl-scroll">
        <table class="data-table">
          <colgroup>
            <col style="width:50px;">
            <col>
            <col style="width:160px;">
          </colgroup>
          <thead>
            <tr>
              <th class="col-no">#</th>
              <th style="text-align:left;">부서명</th>
              <th>부서코드</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${subList == null or #lists.isEmpty(subList)}">
              <td colspan="3">
                <div class="empty-state">
                  <div class="empty-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" style="opacity:.3"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></div>
                  <p>등록된 부서가 없습니다.<br>
                    <a th:href="@{/aff/inst-admin/userDataUpload(year=${year})}"
                       style="color:#3b82f6; font-weight:600;">직원 업로드</a>에서 부서를 먼저 등록해주세요.</p>
                </div>
              </td>
            </tr>

            <tr th:each="sub, stat : ${subList}">
              <td class="col-no" th:text="${stat.count}">1</td>
              <td class="col-name" th:text="${sub.subName}">부서명</td>
              <td class="col-code" th:text="${sub.subCode}">코드</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>
</div>

<div th:replace="~{Include/aff-inst-admin-layout :: scripts}"></div>
<script>
window.addEventListener('DOMContentLoaded', function () {
  document.body.classList.add('page-ready');
});
</script>
</body>
</html>
